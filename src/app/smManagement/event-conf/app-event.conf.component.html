<vmc-toolbar [items]="items()" [useNgContentForRightside]="true">
  <vmc-input-field [formField]="suchleiste" (inputChanged)="searchterm.set($event.toString())">
  </vmc-input-field>
</vmc-toolbar>

<vmc-data-grid
  [dataSource]="(eventListe$ | async) ?? []"
  [columns]="column"
  [paginator]="[5, 10, 20]"
  [filterTerm]="searchterm()"
  [rowActions]="rowActions()"
  (clickedAction)="execAction($event)"
/>
