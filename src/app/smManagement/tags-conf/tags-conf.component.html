<vmc-toolbar [items]="items" [useNgContentForRightside]="true">
  <vmc-input-field
    [formField]="suchleiste"
    (inputChanged)="searchterm.set($event.toString())"
  >
  </vmc-input-field>
</vmc-toolbar>

<vmc-data-grid
  [paginator]="[5, 10, 20]"
  [dataSource]="tagListe ?? []"
  [columns]="column"
  [filterTerm]="searchterm()"
  [rowActions]="[
    {
      key: 'edit',
      icon: 'edit',
    },
    {
      key: 'delete',
      icon: 'delete',
    },
  ]"
  (clickedAction)="execAction($event)"
/>
