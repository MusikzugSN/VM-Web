<vmc-toolbar [items]="toolbarItems" [useNgContentForRightside]="true">
  <div class="gap">
    <vmc-input-field
      [formField]="suchleiste" (inputChanged)="searchterm.set($event.toString())"> <!-- todo wer auch immer bitte mach mal inputchange rein -->
    </vmc-input-field>
  </div>
</vmc-toolbar>
<vmc-data-grid
  [paginator]="((data$ | async) ?? []).length > 5 ? 10 : 5"
  [dataSource]="(data$ | async) ?? []"
  [columns]="columns"
  [filterTerm]="searchterm()"
  [templates]="[
    { keys: ['customActions'], templateRef: actionTemplate }
  ]"
/>

<ng-template #actionTemplate let-rowData="rowData">
  <vmc-icon-button
    [iconName]="'open_in_new'"
    [disabled]="!rowData.link"
    (buttonClicked)="execAction(rowData, 'link')"
  />
  <vmc-icon-button [iconName]="'edit'" (buttonClicked)="execAction(rowData, 'edit')" />
  <vmc-icon-button [iconName]="'delete'" (buttonClicked)="execAction(rowData, 'delete')" />
</ng-template>
