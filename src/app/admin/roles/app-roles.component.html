<vmc-toolbar [items]="items" />
<vmc-data-grid
  [dataSource]="(roles$ | async) ?? []"
  [paginator]="((roles$ | async) ?? []).length > 5 ? 10 : 5"
  [columns]="columns"
  [rowActions]="[
    {
      key: 'edit',
      icon: 'edit',
    },
    {
      key: 'delete',
      icon: 'delete',
    },
  ]"
  (clickedAction)="execAction($event)"
/>
