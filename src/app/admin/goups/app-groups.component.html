<vmc-toolbar [items]="items" />
<vmc-data-grid
  [dataSource]="(data$ | async) ?? []"
  [paginator]="[5, 10, 20]"
  [columns]="columns"
  [rowActions]="[
    {
      key: 'edit',
      icon: 'edit',
    },
    {
      key: 'delete',
      icon: 'delete',
    },
  ]"
  (clickedAction)="execAction($event)"
/>
