<div class="login-page">
  <div class="login-container">
    <vmc-form
      [formData]="{
        submitButtonType: 'filled',
        header: 'Anmeldung',
        description: 'Bitte melde dich mit deinem Anmeldedaten an.',
        submitButton: 'Anmelden',
        fields: [
          {
            label: 'Username',
            type: 'text',
            placeholder: 'z.B. max.mustermann',
            required: true,
            key: 'username',
          },
          {
            label: 'Password',
            type: 'password',
            required: true,
            key: 'password',
          },
        ],
      }"
      (formSubmitted)="loginClicked($event)"
    />

    @for (provider of (oauthProviders$ | async) ?? []; track provider.providerKey) {
      <button
        class="oauth-button"
        (click)="oauthProviderClicked(provider)"
      >
        Mit {{ provider.displayName }} anmelden
      </button>
    }
  </div>
</div>
