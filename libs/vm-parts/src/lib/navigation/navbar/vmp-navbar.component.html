<vmc-navbar
  [showToolbarItems]="isLoggedIn()"
  [applicationName]="displayText() ?? ''"
  [iconLink]="(iconLink$ | async) ?? undefined"
  [toolbarItems]="toolbarItems()"
>
  <vmc-icon-button
    [iconColor]="'white'"
    [iconName]="'logout'"
    (buttonClicked)="logoutClicked.emit(true)"
  />
</vmc-navbar>
