<vmc-toolbar [items]="toolbarItems" [useNgContentForRightside]="true">
  <div class="gap">
    <vmc-input-field
      [formField]="suchleiste"> <!-- todo wer auch immer bitte mach mal inputchange rein -->
    </vmc-input-field>

    <vmc-input-field
      [formField]="filter()"
      (inputChanged)="filterSelectionChange($event)">
    </vmc-input-field>
  </div>
</vmc-toolbar>
<vmc-data-grid
  [dataSource]="filteredData()"
  [columns]="columns"
  [selectionMode]="'multi'"
  [selectionKey]="'notesId'"
  (selectionChanged)="selectionChanged($event)"
/>
