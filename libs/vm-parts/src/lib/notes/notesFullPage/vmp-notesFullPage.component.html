<vmc-toolbar [items]="(toolbarItems$ | async) ?? []" [useNgContentForRightside]="true">
  <div class="gap">
    <vmc-input-field [formField]="suchleiste" (inputChanged)="filterTermChanged($event)">
    </vmc-input-field>

    <vmc-input-field [formField]="filter()" (inputChanged)="filterSelectionChange($event)">
    </vmc-input-field>
  </div>
</vmc-toolbar>
<vmc-data-grid
  [paginator]="[5, 10, 20]"
  [dataSource]="data()"
  [filterTerm]="filterTerm()"
  [columns]="columns"
  [selectionMode]="'multi'"
  [selectionKey]="'notesId'"
  (selectionChanged)="selectionChanged($event)"
  [rowActions]="rowActions()"
  (clickedAction)="execAction($event)"
/>
