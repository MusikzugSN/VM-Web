<vmc-toolbar [items]="(toolbarItems$ | async) ?? []" [useNgContentForRightside]="true">
  <div class="gap">
    <vmc-input-field
      [formField]="suchleiste">
    </vmc-input-field>

    <vmc-input-field
      [formField]="filter()"
      (inputChanged)="filterSelectionChange($event)">
    </vmc-input-field>
  </div>
</vmc-toolbar>
<vmc-data-grid
  [paginator]="(filteredData() ?? []).length > 5 ? 10 : 5"
  [dataSource]="filteredData()"
  [columns]="columns"
  [selectionMode]="'multi'"
  [selectionKey]="'notesId'"
  (selectionChanged)="selectionChanged($event)"
  [rowActions]="[
   {
     key: 'edit',
     icon: 'edit',
      },
    {
     key: 'delete',
     icon: 'delete',
     },
    ]"
  (clickedAction)="execAction($event)"
    />
