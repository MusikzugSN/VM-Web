<vmc-toolbar [items]="toolbarItems" [useNgContentForRightside]="true">
  <div class="gap">
    <vmc-input-field
      [formField]="suchleiste"> <!-- todo wer auch immer bitte mach mal inputchange rein -->
    </vmc-input-field>

    <vmc-input-field
      [formField]="filter()"
      (inputChanged)="filterSelectionChange($event)">
    </vmc-input-field>
  </div>
</vmc-toolbar>
<vmc-data-grid
  [dataSource]="filteredData()"
  [columns]="columns"
  [rowActions]="showEditAction()
    ? (showDeleteAction()
      ? [{ key: 'edit', icon: 'edit' }, { key: 'delete', icon: 'delete' }]
      : [{ key: 'edit', icon: 'edit' }])
    : (showDeleteAction() ? [{ key: 'delete', icon: 'delete' }] : [])"
  [selectionMode]="'multi'"
  [selectionKey]="'notesId'"
  (clickedAction)="execGridAction($event)"
  (selectionChanged)="selectionChanged($event)"
/>
