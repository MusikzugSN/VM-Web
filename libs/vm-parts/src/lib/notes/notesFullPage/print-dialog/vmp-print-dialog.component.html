<div class="modal-overlay">
  <div class="modal-card">
    <div class="flex-column" style="gap: 16px">
      <div style="display: flex; gap: 16px">
        <div class="data-container flex-column">
          <label class="text-normal">Druckoptionen</label>

          <vmc-input-field
            [formField]="(printerSelectorField | async) ?? printersSelectorPlaceholder"
            [shouldInitChange]="false"
            (inputChanged)="storePrinterChange($event)"
          />

          <div style="padding: 8px 0; font-size: 14px;">
            Dateien zum Drucken: {{ filestoPrint().length }}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
