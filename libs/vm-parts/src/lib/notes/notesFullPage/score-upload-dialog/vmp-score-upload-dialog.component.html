<div class="flex-column" style="gap: 16px">

  <div class="data-container-top">
    <label class="text-normal">Stück auswählen</label>

    <vmc-input-field
      [formField]="(scoreField$ | async) ?? scoreFieldPlaceholder"
      [shouldInitChange]="false"
      (inputChanged)="storeChangedValue($event, 'folderId')"
    ></vmc-input-field>
  </div>

  <div class="data-container">
    <label class="text-normal">Dateien oder Ordner hochladen</label>
    <vmc-file-uploader [width]="'100%'" (filesChanged)="fileChangeEvent($event)"/>
  </div>

  @let _files = files();
  @if (_files.length > 0) {
    <div class="data-container-small">
      <label class="text-normal">Stimme zuweisen</label>
      @for (file of _files; track file.path) {
        <div class="file-row">
          <div class="file-path">
            {{ file.path }}
          </div>

          <vmc-input-field
            [formField]="(voiceField$ | async) ?? voiceFieldPlaceholder"
            [shouldInitChange]="false"
            (inputChanged)="storeChangedValue($event, 'voiceId')"
          />
        </div>
      }
    </div>
  }
</div>
