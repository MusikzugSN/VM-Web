<mat-toolbar class="toolbar">
  <span>{{ applicationName() }}</span>

  <span style="margin-right: 3dvw"></span>

  <div class="toolbar-items">
    @for (toolbarItem of this.toolbarItems(); track $index) {
      <div
        [class.toolbar-item__selected]="toolbarItem.selected ?? false"
        class="toolbar-item__wrapper">
        <span style="margin: auto">{{ toolbarItem.name }}</span>
      </div>
    }
  </div>
</mat-toolbar>
