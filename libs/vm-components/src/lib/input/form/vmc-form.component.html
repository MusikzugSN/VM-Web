<form class="flex-column" style="gap: 12px;">
  @let data = formData();
  <label class="text-header">{{ data.header }}</label>
  <span class="text-normal">{{ data.description }}</span>
  <div>
    @for (field of data.fields; track field.key) {
      <vmc-input-field [formField]="field" (inputChanged)="onChange($event, field.key)" />
    }
  </div>
  <vmc-button
    [ngStyle]="{
      'margin-left': data.submitButtonPosition === 'right' ? 'auto' : null,
      'margin-right': data.submitButtonPosition === 'left' ? 'auto' : null,
      'margin-inline': data.submitButtonPosition === 'center' ? 'auto' : null,
      'width': data.submitButtonPosition === 'full' ? '100%' : null
      }"
    [type]="data.submitButtonType ?? 'elevated'"
    [label]="data.submitButton ?? 'Senden'"
    [fullWidth]="data.submitButtonPosition === 'full'"
    (buttonClicked)="submitClicked()"
  />
</form>
