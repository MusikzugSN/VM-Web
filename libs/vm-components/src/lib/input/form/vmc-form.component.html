<form class="flex-column">
  @let data = formData();
  <label class="text-header">{{ data.header }}</label>
  <span class="text-normal">{{ data.description }}</span>
  @for (field of data.fields; track field.key) {
    <vmc-input-field [formField]="field"
      (onChange)="onChange($event, field.key)"/>
  }
  <vmc-button
    style="margin-left: auto"
    [type]="data.submitButtonType ?? 'elevated'"
    [label]="data.submitButton ?? 'Senden'"
    (onClick)="this.submitClicked()"/>
</form>
