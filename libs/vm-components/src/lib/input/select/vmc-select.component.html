<mat-form-field class="vm-input">
  <mat-label>{{ label() }}</mat-label>

  <mat-select
    [multiple]="multiple()"
    [value]="value()"
    (selectionChange)="selectCallChangeEvent($event)"
    (openedChange)="onOpened($event)"
  >
    @if (enableSearch()) {
      <mat-option class="search-option" disabled>
        <input
          #searchInput
          class="search-input"
          type="text"
          placeholder="Search..."
          (keydown)="onSearchKeydown($event)"
          (input)="genericCallChangeEvent($event)"
        />
      </mat-option>
    }

    @for (option of (filteredOptions$ | async) ?? []; track option.value) {
      <mat-option [value]="option.value">{{ option.label }}</mat-option>
    }
  </mat-select>
</mat-form-field>
