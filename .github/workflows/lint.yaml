name: Node.js CI

on: [pull_request]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
      - run: npm ci
      - run: prettier --check .
      - run: npx nx run-many --target=lint --all --output-style=static

